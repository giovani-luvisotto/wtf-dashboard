<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WTF Investments — CIO Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#0f0f0f;--ink2:#2a2a2a;--ink3:#555;--ink4:#888;
  --paper:#fafaf8;--paper2:#f3f2ef;--paper3:#eceae5;
  --rule:#dddbd5;--rule2:#ccc9c0;
  --imob:#1a7a58;--imob-pale:#e8f5f0;
  --prev:#1a4f8a;--prev-pale:#e8f0fa;
  --prov:#5c3d9e;--prov-pale:#f0ecfb;
  --cresc:#b83a10;--cresc-pale:#fdf0eb;
  --up:#15803d;--up-bg:#dcfce7;
  --dn:#b91c1c;--dn-bg:#fee2e2;
  --warn:#92400e;--warn-bg:#fef3c7;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;}
/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:#0f0f0f;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;border-bottom:1px solid #222;}
.hdr-left{display:flex;align-items:center;gap:16px;}
.hdr-logo{font-family:'Fraunces',serif;font-size:20px;font-weight:600;letter-spacing:-0.5px;color:#fff;}
.hdr-sep{width:1px;height:24px;background:#333;}
.hdr-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#888;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:11px;font-family:'IBM Plex Mono',monospace;}
.pill-dark{background:#1a1a1a;border:1px solid #333;color:#aaa;}
.pill-green{background:#0d2e1a;border:1px solid #1a4f2a;color:#7dd3a8;font-size:13px;font-weight:600;}
/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:24px;}
.section-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--ink4);margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--rule);}
/* CONTAINER CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
.card{background:#fff;border:1px solid var(--rule);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .15s;}
.card:hover{border-color:var(--rule2);box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px);}
.card.active{box-shadow:0 0 0 2px var(--card-color);}
.card-bar{height:4px;width:100%;}
.card-body{padding:16px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.card-name{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:500;}
.badge-ok{background:var(--up-bg);color:var(--up);}
.badge-warn{background:var(--warn-bg);color:var(--warn);}
.badge-crit{background:var(--dn-bg);color:var(--dn);}
.card-value{font-family:'Fraunces',serif;font-size:28px;font-weight:600;margin-bottom:12px;line-height:1;}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--rule);}
.card-pct{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink4);}
.card-ytd{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;}
.card-target-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.card-target-label{font-size:10px;color:var(--ink4);font-family:'IBM Plex Mono',monospace;}
/* ANALYTICS */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px;}
.panel{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:20px;}
.panel-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink4);margin-bottom:20px;}
/* Bar charts */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.bar-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink2);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:20px;background:var(--paper3);border-radius:4px;position:relative;overflow:visible;}
.bar-center{position:absolute;top:0;bottom:0;width:1px;background:var(--ink2);z-index:2;}
.bar-fill{position:absolute;top:2px;bottom:2px;border-radius:3px;transition:width .3s;}
.bar-val{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;width:56px;text-align:right;flex-shrink:0;}
/* Alloc bars */
.alloc-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.alloc-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink2);width:80px;flex-shrink:0;}
.alloc-track{flex:1;height:16px;background:var(--paper3);border-radius:4px;position:relative;overflow:visible;}
.alloc-bar{position:absolute;top:0;bottom:0;left:0;border-radius:4px;transition:width .3s;}
.alloc-target{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--ink);border-radius:1px;z-index:2;}
.alloc-val{font-family:'IBM Plex Mono',monospace;font-size:11px;width:80px;text-align:right;flex-shrink:0;}
/* ALERTS */
.alerts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px;}
.alert-card{background:#fff;border:1px solid var(--rule);border-radius:8px;overflow:hidden;}
.alert-bar{height:3px;width:100%;}
.alert-body{padding:14px;}
.alert-type{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.alert-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.alert-desc{font-size:12px;color:var(--ink3);line-height:1.5;}
/* TABLE */
.table-wrap{background:#fff;border:1px solid var(--rule);border-radius:12px;overflow:hidden;}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--rule);flex-wrap:wrap;gap:8px;}
.table-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink4);}
.toolbar-right{display:flex;align-items:center;gap:6px;}
.sort-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--rule);background:var(--paper);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;color:var(--ink3);transition:all .1s;}
.sort-btn:hover,.sort-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.filter-tabs{display:flex;border-bottom:1px solid var(--rule);overflow-x:auto;}
.tab{padding:10px 20px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;border-bottom:2px solid transparent;color:var(--ink4);white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--ink);}
.tab.active{border-bottom-color:var(--tab-color);color:var(--tab-color);font-weight:600;}
table{width:100%;border-collapse:collapse;}
thead th{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink4);padding:10px 12px;text-align:right;background:var(--paper2);border-bottom:1px solid var(--rule);white-space:nowrap;}
thead th:first-child{text-align:left;}
thead th:nth-child(2){text-align:left;}
thead th:nth-child(3){text-align:left;}
tbody tr{border-bottom:1px solid var(--rule);transition:background .1s;}
tbody tr:hover{background:var(--paper2);}
tbody tr:last-child{border-bottom:none;}
td{padding:10px 12px;font-size:13px;vertical-align:middle;}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;}
.tag-gray{background:var(--paper3);color:var(--ink3);}
.ticker-cell{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--ink);}
.val-cell{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink2);}
.conc-cell{text-align:right;min-width:120px;}
.conc-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end;}
.mini-bar-track{width:60px;height:6px;background:var(--paper3);border-radius:3px;overflow:hidden;flex-shrink:0;}
.mini-bar-fill{height:100%;border-radius:3px;}
.conc-pct{font-family:'IBM Plex Mono',monospace;font-size:11px;width:38px;text-align:right;}
.conc-alert{display:inline-block;width:14px;height:14px;background:var(--dn-bg);color:var(--dn);border-radius:50%;font-size:9px;font-weight:700;text-align:center;line-height:14px;}
.perf-cell{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;}
.positive{color:var(--up);}
.negative{color:var(--dn);}
.neutral{color:var(--ink4);}
.hidden{display:none!important;}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <span class="hdr-logo">WTF Investments</span>
    <div class="hdr-sep"></div>
    <span class="hdr-sub">CIO Dashboard</span>
  </div>
  <div class="hdr-right">
    <span class="pill pill-dark">👤 Giovani · Ellen · Bryan</span>
    <span class="pill pill-dark">📅 Maio 2026</span>
    <span class="pill pill-green">R$ 11.38M</span>
  </div>
</header>

<div class="main">

<!-- SECTION 1: CONTAINERS -->
<div class="section-title">Containers</div>
<div class="cards-grid" id="cards-grid"></div>

<!-- SECTION 2: ANALYTICS -->
<div class="section-title">Visão Analítica</div>
<div class="analytics-grid">
  <div class="panel">
    <div class="panel-title">YTD por Container</div>
    <div id="ytd-bars"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Alocação Atual vs Alvo</div>
    <div id="alloc-bars"></div>
  </div>
</div>

<!-- SECTION 3: ALERTS -->
<div class="section-title">Alertas de Compliance</div>
<div class="alerts-grid" id="alerts-grid"></div>

<!-- SECTION 4: TABLE -->
<div class="section-title">Carteira Detalhada</div>
<div class="table-wrap">
  <div class="table-toolbar">
    <span class="table-count" id="asset-count">— ativos</span>
    <div class="toolbar-right">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink4);margin-right:4px;">ORDENAR:</span>
      <button class="sort-btn active" onclick="setSort('valor')">Valor</button>
      <button class="sort-btn" onclick="setSort('ano')">YTD</button>
      <button class="sort-btn" onclick="setSort('mes')">Mês</button>
      <button class="sort-btn" onclick="setSort('dia')">Dia</button>
      <button class="sort-btn" onclick="setSort('conc')">Conc.</button>
      <button class="sort-btn" id="pos-btn" onclick="togglePos()">Só ▲</button>
    </div>
  </div>
  <div class="filter-tabs" id="filter-tabs"></div>
  <table>
    <thead>
      <tr>
        <th>Container</th>
        <th>Subclasse</th>
        <th>Ativo</th>
        <th style="text-align:right">Valor</th>
        <th style="text-align:right">Conc.</th>
        <th style="text-align:right">Dia</th>
        <th style="text-align:right">Mês</th>
        <th style="text-align:right">YTD</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

</div><!-- /main -->

const CONTAINER_VALS = {"Imobilizado": 3632862.95, "Previdência": 2928955.68, "Proventos": 3004496.78, "Crescimento": 1809612.34};
const TOTAL = 11375927.75;
const TARGETS = {Imobilizado:0.20,Previdência:0.30,Proventos:0.30,Crescimento:0.20};
const COLORS = {Imobilizado:'#1a7a58',Previdência:'#1a4f8a',Proventos:'#5c3d9e',Crescimento:'#b83a10'};
const PALES = {Imobilizado:'#e8f5f0',Previdência:'#e8f0fa',Proventos:'#f0ecfb',Crescimento:'#fdf0eb'};
const LIMIT = (c,t)=>{if(c==='Imobilizado'||c==='Previdência')return 0.50;if(t==='BTC')return 0.50;return 0.10;};

let activeContainer = null;
let sortBy = 'valor';
let posOnly = false;

// Aggregate by container+ticker
const agg = {};
RAW.forEach(r=>{
  const k=r.container+'|||'+r.ticker;
  if(!agg[k])agg[k]={container:r.container,subcat:r.subcat,ticker:r.ticker,valor:0,dw:0,mw:0,aw:0};
  agg[k].valor+=r.valor;
  agg[k].dw+=r.dia*r.valor;
  agg[k].mw+=r.mes*r.valor;
  agg[k].aw+=r.ano*r.valor;
});
const rows=Object.values(agg).map(r=>{
  return{...r,dia:r.dw/r.valor,mes:r.mw/r.valor,ano:r.aw/r.valor,conc:r.valor/CONTAINER_VALS[r.container]};
});

// Container weighted YTD
function containerYTD(c){
  const rs=rows.filter(r=>r.container===c);
  const tv=rs.reduce((s,r)=>s+r.valor,0);
  if(!tv)return 0;
  return rs.reduce((s,r)=>s+r.ano*r.valor,0)/tv;
}

// BUILD CARDS
function buildCards(){
  const grid=document.getElementById('cards-grid');
  ['Imobilizado','Previdência','Proventos','Crescimento'].forEach(c=>{
    const val=CONTAINER_VALS[c];
    const pct=val/TOTAL;
    const target=TARGETS[c];
    const diff=pct-target;
    const ytd=containerYTD(c);
    const color=COLORS[c];
    // compliance badge
    const absDiff=Math.abs(diff)*100;
    let badge,badgeClass;
    if(absDiff<=2){badge='OK';badgeClass='badge-ok';}
    else if(absDiff<=5){badge='Desvio';badgeClass='badge-warn';}
    else{badge='Crítico';badgeClass='badge-crit';}
    const ytdClass=ytd>0?'positive':ytd<0?'negative':'neutral';
    const div=document.createElement('div');
    div.className='card';
    div.style.setProperty('--card-color',color);
    div.innerHTML=`
      <div class="card-bar" style="background:${color}"></div>
      <div class="card-body">
        <div class="card-header">
          <span class="card-name">${c}</span>
          <span class="badge ${badgeClass}">${badge}</span>
        </div>
        <div class="card-value" style="color:${color}">R$ ${(val/1e6).toFixed(2)}M</div>
        <div class="card-footer">
          <div>
            <div class="card-pct">${(pct*100).toFixed(1)}% portfólio</div>
            <div class="card-target-row">
              <span class="card-target-label">Alvo: ${(target*100).toFixed(0)}% | Δ: ${diff>=0?'+':''}${(diff*100).toFixed(1)}pp</span>
            </div>
          </div>
          <div class="card-ytd ${ytdClass}">${ytd>=0?'+':''}${(ytd*100).toFixed(1)}% YTD</div>
        </div>
      </div>`;
    div.onclick=()=>toggleContainer(c,div);
    grid.appendChild(div);
  });
}

function toggleContainer(c,el){
  if(activeContainer===c){activeContainer=null;document.querySelectorAll('.card').forEach(x=>x.classList.remove('active'));}
  else{activeContainer=c;document.querySelectorAll('.card').forEach(x=>x.classList.remove('active'));el.classList.add('active');}
  renderTable();updateTabActive();
}

// BUILD YTD BARS
function buildYTD(){
  const div=document.getElementById('ytd-bars');
  ['Imobilizado','Previdência','Proventos','Crescimento'].forEach(c=>{
    const ytd=containerYTD(c)*100;
    const color=COLORS[c];
    const isPos=ytd>=0;
    const maxAbs=20;
    const half=50;
    const fillW=Math.min(Math.abs(ytd)/maxAbs*half,half);
    const left=isPos?half:half-fillW;
    const row=document.createElement('div');
    row.className='bar-row';
    row.innerHTML=`
      <span class="bar-label">${c}</span>
      <div class="bar-track">
        <div class="bar-center" style="left:50%"></div>
        <div class="bar-fill" style="left:${left}%;width:${fillW}%;background:${isPos?'#15803d':'#b91c1c'};top:2px;bottom:2px;border-radius:3px;"></div>
      </div>
      <span class="bar-val" style="color:${isPos?'#15803d':'#b91c1c'}">${ytd>=0?'+':''}${ytd.toFixed(1)}%</span>`;
    div.appendChild(row);
  });
}

// BUILD ALLOC BARS
function buildAlloc(){
  const div=document.getElementById('alloc-bars');
  ['Imobilizado','Previdência','Proventos','Crescimento'].forEach(c=>{
    const actual=(CONTAINER_VALS[c]/TOTAL)*100;
    const target=TARGETS[c]*100;
    const color=COLORS[c];
    const row=document.createElement('div');
    row.className='alloc-row';
    row.innerHTML=`
      <span class="alloc-label">${c}</span>
      <div class="alloc-track">
        <div class="alloc-bar" style="width:${Math.min(actual,100)}%;background:${color};opacity:0.85;"></div>
        <div class="alloc-target" style="left:${target}%;"></div>
      </div>
      <span class="alloc-val" style="color:${color}">${actual.toFixed(1)}% <span style="color:var(--ink4);font-size:10px">/ ${target.toFixed(0)}%</span></span>`;
    div.appendChild(row);
  });
  // Legend
  const leg=document.createElement('div');
  leg.style.cssText='display:flex;align-items:center;gap:6px;margin-top:12px;font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--ink4);';
  leg.innerHTML='<div style="width:16px;height:2px;background:var(--ink);"></div> linha = alvo estratégico';
  div.appendChild(leg);
}

// BUILD ALERTS
function buildAlerts(){
  const grid=document.getElementById('alerts-grid');
  const alerts=[];
  
  // Concentration breaches
  rows.forEach(r=>{
    const lim=LIMIT(r.container,r.ticker);
    if(r.conc>lim){
      alerts.push({
        level:'crit',color:'#b91c1c',
        type:'CONCENTRAÇÃO',
        title:`${r.ticker} — ${r.container}`,
        desc:`${(r.conc*100).toFixed(1)}% do container (limite ${(lim*100).toFixed(0)}%). Excesso de ${((r.conc-lim)*100).toFixed(1)}pp.`
      });
    }
  });

  // Container allocation deviations
  ['Imobilizado','Previdência','Proventos','Crescimento'].forEach(c=>{
    const actual=CONTAINER_VALS[c]/TOTAL;
    const target=TARGETS[c];
    const diff=(actual-target)*100;
    if(Math.abs(diff)>2){
      alerts.push({
        level:Math.abs(diff)>5?'crit':'warn',
        color:Math.abs(diff)>5?'#b91c1c':'#d97706',
        type:'ALOCAÇÃO',
        title:`${c} ${diff>0?'SOBREPONDERADO':'SUBPONDERADO'}`,
        desc:`Atual ${(actual*100).toFixed(1)}% vs alvo ${(target*100).toFixed(0)}% — desvio de ${diff>=0?'+':''}${diff.toFixed(1)}pp.`
      });
    }
  });

  // YTD < -20% with value > 10k
  rows.forEach(r=>{
    if(r.ano<-0.20&&r.valor>10000){
      alerts.push({
        level:'warn',color:'#d97706',
        type:'REVISAR TESE',
        title:`${r.ticker} — YTD ${(r.ano*100).toFixed(1)}%`,
        desc:`Valor R$${(r.valor/1000).toFixed(1)}k com performance negativa expressiva. Fundamento ainda válido?`
      });
    }
  });

  // Anomalies YTD > 200%
  rows.forEach(r=>{
    if(Math.abs(r.ano)>2){
      alerts.push({
        level:'info',color:'#1a4f8a',
        type:'ANOMALIA DADOS',
        title:`${r.ticker} — YTD ${(r.ano*100).toFixed(0)}%`,
        desc:`Variação anual de ${(r.ano*100).toFixed(0)}% é atípica. Provável distorção no dado de retorno. Verificar planilha.`
      });
    }
  });

  alerts.forEach(a=>{
    const el=document.createElement('div');
    el.className='alert-card';
    el.innerHTML=`
      <div class="alert-bar" style="background:${a.color}"></div>
      <div class="alert-body">
        <div class="alert-type" style="color:${a.color}">${a.type}</div>
        <div class="alert-title">${a.title}</div>
        <div class="alert-desc">${a.desc}</div>
      </div>`;
    grid.appendChild(el);
  });
}

// FILTER TABS
function buildTabs(){
  const tabs=document.getElementById('filter-tabs');
  const all=['Todos','Imobilizado','Previdência','Proventos','Crescimento'];
  all.forEach(c=>{
    const t=document.createElement('div');
    t.className='tab'+(c==='Todos'?' active':'');
    t.textContent=c;
    t.style.setProperty('--tab-color',c==='Todos'?'var(--ink)':COLORS[c]);
    t.onclick=()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      activeContainer=c==='Todos'?null:c;
      document.querySelectorAll('.card').forEach(x=>x.classList.remove('active'));
      if(activeContainer){
        document.querySelectorAll('.card').forEach((x,i)=>{
          const names=['Imobilizado','Previdência','Proventos','Crescimento'];
          if(names[i]===activeContainer)x.classList.add('active');
        });
      }
      renderTable();
    };
    tabs.appendChild(t);
  });
}

function updateTabActive(){
  document.querySelectorAll('.tab').forEach(t=>{
    const name=t.textContent;
    t.classList.toggle('active',name===(activeContainer||'Todos'));
  });
}

function setSort(s){
  sortBy=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(sortBy==='valor'?'Valor':sortBy==='ano'?'YTD':sortBy==='mes'?'Mês':sortBy==='dia'?'Dia':'Conc')));
  renderTable();
}

function togglePos(){
  posOnly=!posOnly;
  document.getElementById('pos-btn').classList.toggle('active',posOnly);
  renderTable();
}

function fmt(v,decimals=2){
  if(v===0)return'—';
  const s=v>=0?'+':'';
  return s+(v*100).toFixed(decimals)+'%';
}
function fmtBRL(v){
  return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function perfClass(v){return v>0.001?'positive':v<-0.001?'negative':'neutral';}

function renderTable(){
  let data=[...rows];
  if(activeContainer)data=data.filter(r=>r.container===activeContainer);
  if(posOnly)data=data.filter(r=>r.ano>0);
  data.sort((a,b)=>{
    if(sortBy==='valor')return b.valor-a.valor;
    if(sortBy==='ano')return b.ano-a.ano;
    if(sortBy==='mes')return b.mes-a.mes;
    if(sortBy==='dia')return b.dia-a.dia;
    if(sortBy==='conc')return b.conc-a.conc;
    return 0;
  });
  document.getElementById('asset-count').textContent=`${data.length} ativo${data.length!==1?'s':''}`;
  const tbody=document.getElementById('table-body');
  tbody.innerHTML='';
  data.forEach(r=>{
    const color=COLORS[r.container];
    const pale=PALES[r.container];
    const lim=LIMIT(r.container,r.ticker);
    const isBreached=r.conc>lim;
    const concPct=(r.conc*100).toFixed(1);
    const barW=Math.min(r.conc/lim*100,100);
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span class="tag" style="background:${pale};color:${color}">${r.container}</span></td>
      <td><span class="tag tag-gray">${r.subcat||'—'}</span></td>
      <td class="ticker-cell">${r.ticker||'—'}</td>
      <td class="val-cell">${fmtBRL(r.valor)}</td>
      <td class="conc-cell">
        <div class="conc-wrap">
          ${isBreached?'<span class="conc-alert">!</span>':''}
          <div class="mini-bar-track">
            <div class="mini-bar-fill" style="width:${barW}%;background:${isBreached?'#b91c1c':color};"></div>
          </div>
          <span class="conc-pct" style="color:${isBreached?'#b91c1c':'var(--ink3)'}">${concPct}%</span>
        </div>
      </td>
      <td class="perf-cell ${perfClass(r.dia)}">${fmt(r.dia)}</td>
      <td class="perf-cell ${perfClass(r.mes)}">${fmt(r.mes)}</td>
      <td class="perf-cell ${perfClass(r.ano)}">${fmt(r.ano)}</td>`;
    tbody.appendChild(tr);
  });
}

buildCards();
buildYTD();
buildAlloc();
buildAlerts();
buildTabs();
renderTable();
</script>
</body>
</html>
