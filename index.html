<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WTF Investments — Dashboard CIO</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --surface: #111318;
    --surface2: #181b22;
    --border: #22262f;
    --text: #e8eaf0;
    --muted: #6b7280;
    --imob: #1D9E75;
    --prev: #378ADD;
    --prov: #7F77DD;
    --cresc: #D85A30;
    --alert-red: #ef4444;
    --alert-yellow: #f59e0b;
    --alert-green: #22c55e;
    --font-mono: 'Space Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:0;
    opacity:0.4;
  }

  header {
    position: relative;
    z-index:10;
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: rgba(10,11,15,0.95);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-main {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-meta {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .meta-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .total-pill {
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-weight: 700;
  }

  main {
    position: relative;
    z-index: 5;
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* METRIC CARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 12px 0 0 12px;
  }

  .card.imob::before { background: var(--imob); }
  .card.prev::before { background: var(--prev); }
  .card.prov::before { background: var(--prov); }
  .card.cresc::before { background: var(--cresc); }

  .card:hover {
    border-color: #333;
    transform: translateY(-2px);
    background: var(--surface2);
  }

  .card.active {
    border-color: #444;
    background: var(--surface2);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .card-name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 8px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .badge-green { background: rgba(34,197,94,0.15); color: var(--alert-green); border: 1px solid rgba(34,197,94,0.3); }
  .badge-yellow { background: rgba(245,158,11,0.15); color: var(--alert-yellow); border: 1px solid rgba(245,158,11,0.3); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--alert-red); border: 1px solid rgba(239,68,68,0.3); }

  .card-value {
    font-family: var(--font-mono);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 6px;
    line-height: 1;
  }

  .card-sub {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .card-pct {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  .card-ytd {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
  }

  .pos { color: var(--alert-green); }
  .neg { color: var(--alert-red); }

  /* CHARTS ROW */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* BAR CHART YTD */
  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 110px 1fr 60px;
    gap: 10px;
    align-items: center;
  }

  .bar-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-align: right;
  }

  .bar-track {
    background: var(--surface2);
    border-radius: 4px;
    height: 8px;
    position: relative;
    overflow: visible;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }

  .bar-zero {
    position: absolute;
    top: -4px;
    width: 2px;
    height: 16px;
    background: var(--border);
    z-index: 2;
  }

  .bar-val {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    text-align: right;
  }

  /* ALLOCATION BARS */
  .alloc-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .alloc-row { }

  .alloc-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .alloc-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .alloc-numbers {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .alloc-track {
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    position: relative;
  }

  .alloc-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
  }

  .alloc-target-line {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 12px;
    background: rgba(255,255,255,0.3);
    border-radius: 1px;
  }

  /* ALERTS PANEL */
  .alerts-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 28px;
  }

  .alert-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .alert-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px;
    border-left: 3px solid var(--border);
  }

  .alert-item.critical { border-left-color: var(--alert-red); }
  .alert-item.warning { border-left-color: var(--alert-yellow); }
  .alert-item.info { border-left-color: var(--prev); }

  .alert-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .alert-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .alert-desc {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* DRILL-DOWN TABLE */
  .table-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .table-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .breadcrumb {
    display: flex;
    gap: 6px;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
    flex: 1;
  }

  .bc-item {
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s;
  }

  .bc-item:hover { color: var(--text); }
  .bc-item.active { color: var(--text); font-weight: 700; }
  .bc-sep { color: var(--border); }

  .filter-row {
    display: flex;
    gap: 8px;
  }

  .filter-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .filter-btn:hover { border-color: #444; color: var(--text); }
  .filter-btn.active { background: var(--surface2); border-color: #444; color: var(--text); }

  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  .data-table th:hover { color: var(--text); }

  .data-table td {
    padding: 10px 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(34,38,47,0.5);
    vertical-align: middle;
  }

  .data-table tr:hover td { background: var(--surface2); }

  .data-table .mono { font-family: var(--font-mono); font-size: 12px; }

  .ticker-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .pct-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pct-mini-track {
    width: 50px;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    flex-shrink: 0;
  }

  .pct-mini-fill {
    height: 100%;
    border-radius: 2px;
  }

  .conc-flag {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    background: rgba(239,68,68,0.15);
    color: var(--alert-red);
    border: 1px solid rgba(239,68,68,0.3);
    margin-left: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }

  /* CONTAINER COLOR DOTS */
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card, .panel, .alerts-panel, .table-panel {
    animation: fadeIn 0.4s ease backwards;
  }

  .cards-grid .card:nth-child(1) { animation-delay: 0.05s; }
  .cards-grid .card:nth-child(2) { animation-delay: 0.1s; }
  .cards-grid .card:nth-child(3) { animation-delay: 0.15s; }
  .cards-grid .card:nth-child(4) { animation-delay: 0.2s; }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-main">WTF Investments</span>
    <span class="logo-sub">CIO Dashboard</span>
  </div>
  <div class="header-meta">
    <span class="meta-pill">Giovani · Ellen · Bryan</span>
    <span class="meta-pill" id="currentDate"></span>
    <span class="total-pill" id="totalValue"></span>
  </div>
</header>

<main>

  <!-- METRIC CARDS -->
  <div class="section-label">Containers</div>
  <div class="cards-grid" id="cardsGrid"></div>

  <!-- CHARTS -->
  <div class="charts-row">
    <div class="panel">
      <div class="panel-title">Desempenho YTD por Container</div>
      <div class="bar-chart" id="ytdChart"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Alocação Atual vs Alvo</div>
      <div class="alloc-list" id="allocList"></div>
    </div>
  </div>

  <!-- ALERTS -->
  <div class="alerts-panel">
    <div class="panel-title">⚡ Alertas de Compliance</div>
    <div class="alert-grid" id="alertGrid"></div>
  </div>

  <!-- DRILL-DOWN TABLE -->
  <div class="table-panel">
    <div class="table-controls">
      <div class="breadcrumb" id="breadcrumb">
        <span class="bc-item active" onclick="drillTo(null)">Portfolio</span>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setSort('valor', this)">Valor ↕</button>
        <button class="filter-btn" onclick="setSort('ano', this)">YTD ↕</button>
        <button class="filter-btn" onclick="setSort('mes', this)">Mês ↕</button>
        <button class="filter-btn" onclick="setSort('dia', this)">Dia ↕</button>
        <button class="filter-btn" id="posFilter" onclick="togglePosFilter()">+ Positivo</button>
        <select onchange="setContainerFilter(this.value)" id="containerFilter">
          <option value="">Todos Containers</option>
          <option value="Imobilizado">Imobilizado</option>
          <option value="Previdência">Previdência</option>
          <option value="Proventos">Proventos</option>
          <option value="Crescimento">Crescimento</option>
        </select>
      </div>
    </div>
    <table class="data-table" id="dataTable">
      <thead>
        <tr>
          <th onclick="setSort('container')">Container</th>
          <th onclick="setSort('subcat')">Subclasse</th>
          <th onclick="setSort('ticker')">Ativo</th>
          <th onclick="setSort('valor')" style="text-align:right">Valor (R$)</th>
          <th onclick="setSort('conc')" style="text-align:right">Conc.</th>
          <th onclick="setSort('dia')" style="text-align:right">Dia</th>
          <th onclick="setSort('mes')" style="text-align:right">Mês</th>
          <th onclick="setSort('ano')" style="text-align:right">YTD</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</main>

const COLORS = {Imobilizado:'#1D9E75',Previdência:'#378ADD',Proventos:'#7F77DD',Crescimento:'#D85A30'};
const TARGETS = {Imobilizado:0.20,Previdência:0.30,Proventos:0.30,Crescimento:0.20};
const LIMITS = {Imobilizado:0.50,Previdência:0.50,Proventos:0.10,Crescimento:0.10};
const CONTAINERS = ['Imobilizado','Previdência','Proventos','Crescimento'];

let sortKey = 'valor';
let sortDir = -1;
let posOnly = false;
let containerFilter = '';
let activeCard = null;

// Aggregate
const totals = {};
CONTAINERS.forEach(c => {
  const recs = RECORDS.filter(r => r.container === c);
  const total = recs.reduce((s,r) => s+r.valor, 0);
  const ytd_w = recs.reduce((s,r) => s+r.valor*r.ano, 0) / total;
  totals[c] = { total, ytd_w, recs };
});
const grandTotal = Object.values(totals).reduce((s,v) => s+v.total, 0);

// Date
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
document.getElementById('totalValue').textContent = 'R$ ' + (grandTotal/1e6).toFixed(3).replace('.',',') + 'M';

// CARDS
function getBadge(container) {
  const pct = totals[container].total / grandTotal;
  const dev = Math.abs(pct - TARGETS[container]);
  if (dev < 0.02) return ['verde','OK'];
  if (dev < 0.05) return ['amarelo','⚠ DESVIO'];
  return ['vermelho','✖ CRÍTICO'];
}

const badgeClass = {verde:'badge-green',amarelo:'badge-yellow',vermelho:'badge-red'};

const cardsGrid = document.getElementById('cardsGrid');
CONTAINERS.forEach(c => {
  const d = totals[c];
  const pct = d.total / grandTotal;
  const [status, label] = getBadge(c);
  const ytdSign = d.ytd_w >= 0 ? 'pos' : 'neg';
  const ytdStr = (d.ytd_w >= 0 ? '+' : '') + (d.ytd_w*100).toFixed(2) + '%';
  const cls = {Imobilizado:'imob',Previdência:'prev',Proventos:'prov',Crescimento:'cresc'}[c];
  
  cardsGrid.innerHTML += `
    <div class="card ${cls}" onclick="toggleCard('${c}',this)">
      <div class="card-header">
        <span class="card-name">${c}</span>
        <span class="badge ${badgeClass[status]}">${label}</span>
      </div>
      <div class="card-value" style="color:${COLORS[c]}">R$ ${(d.total/1e6).toFixed(3).replace('.',',')}M</div>
      <div class="card-sub">
        <span class="card-pct">${(pct*100).toFixed(1)}% do total</span>
        <span class="card-ytd ${ytdSign}">${ytdStr} YTD</span>
      </div>
    </div>
  `;
});

function toggleCard(c, el) {
  if (activeCard === c) {
    activeCard = null;
    containerFilter = '';
    document.getElementById('containerFilter').value = '';
    document.querySelectorAll('.card').forEach(x => x.classList.remove('active'));
  } else {
    activeCard = c;
    containerFilter = c;
    document.getElementById('containerFilter').value = c;
    document.querySelectorAll('.card').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
  }
  renderTable();
}

// YTD CHART
const ytdChart = document.getElementById('ytdChart');
const allYtds = CONTAINERS.map(c => totals[c].ytd_w);
const maxAbs = Math.max(...allYtds.map(Math.abs), 0.15);

CONTAINERS.forEach(c => {
  const ytd = totals[c].ytd_w;
  const pct50 = (ytd / maxAbs) * 50; // map to 0-50% width from center
  const isPos = ytd >= 0;
  const sign = isPos ? '+' : '';
  
  ytdChart.innerHTML += `
    <div class="bar-row">
      <div class="bar-label">${c}</div>
      <div class="bar-track" style="position:relative;">
        <div class="bar-zero" style="left:50%;"></div>
        <div class="bar-fill" style="
          width:${Math.abs(pct50)}%;
          background:${COLORS[c]};
          position:absolute;
          top:0;
          ${isPos ? 'left:50%' : 'right:50%'};
          border-radius:${isPos ? '0 4px 4px 0' : '4px 0 0 4px'};
        "></div>
      </div>
      <div class="bar-val ${isPos?'pos':'neg'}">${sign}${(ytd*100).toFixed(2)}%</div>
    </div>
  `;
});

// ALLOCATION BARS
const allocList = document.getElementById('allocList');
CONTAINERS.forEach(c => {
  const pct = totals[c].total / grandTotal;
  const target = TARGETS[c];
  const dev = pct - target;
  const devStr = (dev >= 0 ? '+' : '') + (dev*100).toFixed(1) + 'pp';
  const devColor = Math.abs(dev) < 0.02 ? '#22c55e' : Math.abs(dev) < 0.05 ? '#f59e0b' : '#ef4444';
  
  allocList.innerHTML += `
    <div class="alloc-row">
      <div class="alloc-header">
        <span class="alloc-name"><span class="dot" style="background:${COLORS[c]}"></span>${c}</span>
        <span class="alloc-numbers">${(pct*100).toFixed(1)}% <span style="color:${devColor};font-weight:700">(${devStr})</span> / alvo ${(target*100).toFixed(0)}%</span>
      </div>
      <div class="alloc-track">
        <div class="alloc-fill" style="width:${Math.min(pct/0.5*100,100)}%;background:${COLORS[c]};opacity:0.85"></div>
        <div class="alloc-target-line" style="left:${target/0.5*100}%"></div>
      </div>
    </div>
  `;
});

// CONCENTRATION
function getConc(ticker, container) {
  const total_c = totals[container].total;
  const val = RECORDS.filter(r => r.container===container && r.ticker===ticker).reduce((s,r)=>s+r.valor,0);
  return val / total_c;
}

function concLimit(ticker, container) {
  if (container === 'Crescimento' && ticker === 'BTC') return 0.50;
  return LIMITS[container];
}

// Aggregated by ticker+container for concentration
function buildAggregated() {
  const map = {};
  RECORDS.forEach(r => {
    const key = `${r.container}||${r.ticker}`;
    if (!map[key]) map[key] = {...r, valor:0};
    map[key].valor += r.valor;
    map[key].dia = r.dia;
    map[key].mes = r.mes;
    map[key].ano = r.ano;
  });
  return Object.values(map);
}

// ALERTS
const aggregated = buildAggregated();
const alerts = [];

// Concentration alerts
aggregated.forEach(r => {
  const total_c = totals[r.container].total;
  const pct = r.valor / total_c;
  const lim = concLimit(r.ticker, r.container);
  if (pct > lim) {
    alerts.push({
      type: 'critical',
      tag: '⚠ CONCENTRAÇÃO',
      title: `${r.ticker} — ${r.container}`,
      desc: `${(pct*100).toFixed(1)}% do container (limite: ${(lim*100).toFixed(0)}%)`
    });
  }
});

// Desvio de alocação
CONTAINERS.forEach(c => {
  const pct = totals[c].total / grandTotal;
  const dev = pct - TARGETS[c];
  if (Math.abs(dev) > 0.02) {
    const dir = dev > 0 ? 'sobreponderado' : 'subponderado';
    const type = Math.abs(dev) > 0.05 ? 'critical' : 'warning';
    alerts.push({
      type,
      tag: '📊 ALOCAÇÃO',
      title: `${c} ${dir}`,
      desc: `${(pct*100).toFixed(1)}% atual vs ${(TARGETS[c]*100).toFixed(0)}% alvo (${(dev>=0?'+':'')+(dev*100).toFixed(1)}pp)`
    });
  }
});

// YTD < -20%
aggregated.forEach(r => {
  if (r.ano < -0.20 && r.valor > 10000) {
    alerts.push({
      type: 'warning',
      tag: '📉 PERFORMANCE',
      title: `${r.ticker}`,
      desc: `YTD ${(r.ano*100).toFixed(1)}% — revisar tese de investimento`
    });
  }
});

// Anomalias YTD > 200%
aggregated.forEach(r => {
  if (r.ano > 2.00) {
    alerts.push({
      type: 'info',
      tag: '🔍 ANOMALIA',
      title: `${r.ticker}`,
      desc: `YTD ${(r.ano*100).toFixed(0)}% — possível distorção de dados`
    });
  }
});

const alertGrid = document.getElementById('alertGrid');
if (alerts.length === 0) {
  alertGrid.innerHTML = '<div style="color:#22c55e;font-size:13px;padding:12px">Nenhum alerta ativo. Portfolio em conformidade.</div>';
} else {
  alerts.slice(0,9).forEach(a => {
    alertGrid.innerHTML += `
      <div class="alert-item ${a.type}">
        <div class="alert-tag">${a.tag}</div>
        <div class="alert-title">${a.title}</div>
        <div class="alert-desc">${a.desc}</div>
      </div>
    `;
  });
}

// TABLE
function fmtPct(v) {
  if (!v && v !== 0) return '—';
  const cls = v >= 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${v>=0?'+':''}${(v*100).toFixed(2)}%</span>`;
}

function fmtVal(v) {
  return 'R$ ' + v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function renderTable() {
  let data = [...aggregated];
  if (containerFilter) data = data.filter(r => r.container === containerFilter);
  if (posOnly) data = data.filter(r => r.ano > 0);
  
  // Sort
  data.sort((a,b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (sortKey === 'conc') {
      va = a.valor / totals[a.container].total;
      vb = b.valor / totals[b.container].total;
    }
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return ((va||0) - (vb||0)) * sortDir;
  });

  const tbody = document.getElementById('tableBody');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Nenhum ativo encontrado</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(r => {
    const total_c = totals[r.container].total;
    const conc = r.valor / total_c;
    const lim = concLimit(r.ticker, r.container);
    const over = conc > lim;
    const concPct = `${(conc*100).toFixed(1)}%`;
    const flag = over ? `<span class="conc-flag">!</span>` : '';
    const barW = Math.min(conc/lim*100,100);
    
    return `<tr>
      <td><span class="dot" style="background:${COLORS[r.container]}"></span>${r.container}</td>
      <td style="color:var(--muted);font-size:12px">${r.subcat}</td>
      <td><span class="ticker-pill">${r.ticker}</span></td>
      <td class="mono" style="text-align:right">${fmtVal(r.valor)}</td>
      <td style="text-align:right">
        <div class="pct-bar" style="justify-content:flex-end">
          <span class="mono" style="${over?'color:var(--alert-red)':''}">${concPct}${flag}</span>
          <div class="pct-mini-track">
            <div class="pct-mini-fill" style="width:${barW}%;background:${over?'var(--alert-red)':COLORS[r.container]}"></div>
          </div>
        </div>
      </td>
      <td class="mono" style="text-align:right">${fmtPct(r.dia)}</td>
      <td class="mono" style="text-align:right">${fmtPct(r.mes)}</td>
      <td class="mono" style="text-align:right">${fmtPct(r.ano)}</td>
    </tr>`;
  }).join('');
}

function setSort(key, btn) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = -1; }
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTable();
}

function togglePosFilter() {
  posOnly = !posOnly;
  document.getElementById('posFilter').classList.toggle('active', posOnly);
  renderTable();
}

function setContainerFilter(val) {
  containerFilter = val;
  activeCard = val || null;
  document.querySelectorAll('.card').forEach(x => x.classList.remove('active'));
  if (val) {
    const idx = CONTAINERS.indexOf(val);
    if (idx >= 0) document.querySelectorAll('.card')[idx].classList.add('active');
  }
  renderTable();
}

function drillTo(val) {
  containerFilter = val || '';
  activeCard = val || null;
  document.getElementById('containerFilter').value = val || '';
  document.querySelectorAll('.card').forEach(x => x.classList.remove('active'));
  renderTable();
}

renderTable();
</script>
</body>
</html>
